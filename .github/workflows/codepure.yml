name: Codepure Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  codepure_devsecops_gate:
    name: Codepure Scan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Codepure API
        id: codepure-scan
        run: |
          echo "Triggering Codepure DevSecOps Scan..."
          
          if [ -z "${{ secrets.CODEPURE_TOKEN }}" ]; then
            echo "ERROR: CODEPURE_TOKEN is missing! Please add it to your GitHub Repository Secrets."
            exit 1
          fi

          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          BASE_BRANCH="${{ github.base_ref || github.event.repository.default_branch }}"
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          # FIX: Safely construct JSON using jq
          PAYLOAD=$(jq -n -c \
            --arg pid "${{ github.repository }}" \
            --arg repo "${{ github.repository }}" \
            --arg branch "$BRANCH_NAME" \
            --arg base "$BASE_BRANCH" \
            --arg commit "$COMMIT_SHA" \
            --arg actor "${{ github.actor }}" \
            '{project_id: $pid, repo_name: $repo, branch: $branch, base_branch: $base, commit_hash: $commit, provider: "github", triggered_by: $actor}')

          echo "DEBUG: Generated JSON Payload"
          echo "PAYLOAD: $PAYLOAD"

          # Pass the safe $PAYLOAD variable to curl
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://1798-2001-16a2-df2a-3700-6d57-96ff-cfb3-f25.ngrok-free.app/api/devsecops/scan/trigger" \
            -H "Authorization: Token ${{ secrets.CODEPURE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
            
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
             echo "FATAL: Failed to reach Codepure API (Status: $HTTP_STATUS)"
             echo "Response: $BODY"
             exit 1
          fi

          API_STATUS=$(echo "$BODY" | jq -r '.status')
          API_MSG=$(echo "$BODY" | jq -r '.message')
          MD_SUMMARY=$(echo "$BODY" | jq -r '.markdown_summary')

          echo "$MD_SUMMARY" > codepure_report.md
          echo "$MD_SUMMARY" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "========================================================"
          cat codepure_report.md
          echo "========================================================"
          echo ""

          if [ "$API_STATUS" == "blocked" ]; then
            echo "::error title=Security Gate Failed::$API_MSG"
            echo "SECURITY GATE FAILED: $API_MSG"
            exit 1
          fi

          if [ "$API_STATUS" == "warn" ]; then
            echo "::warning title=Audit Warning::$API_MSG"
            echo "AUDIT WARNING: $API_MSG"
            exit 0
          fi
          
          echo "Security Check Passed cleanly."